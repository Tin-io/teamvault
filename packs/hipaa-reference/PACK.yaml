name: hipaa-reference
version: 0.1.1
description: >
  Reference example of a pack contributing PHI-pattern scrubbers + a reviewer
  agent. Ships a small starting set of regex patterns (MRN, SSN, NPI,
  partial-DOB) and wires them into the pack runtime as one layer of defense.
  NOT a HIPAA compliance control. NOT certified. NOT a substitute for BAAs,
  organizational controls, legal review, or a real compliance officer. See
  packs/hipaa-reference/README.md for the full positioning + what teams must
  do before relying on it.

knowledge_topics:
  - hipaa
  - phi
  - safe-harbor
  - de-identification
  - audit-log
  - phi-cryptography
  - identifier-derivation

contributions:
  agents:
    - path: agents/hipaa-reviewer.md
  scrubbers:
    - type: regex
      file: scrubbers/phi_patterns.yaml
  reviewers:
    - agent: hipaa-reviewer
      mode: blocking
