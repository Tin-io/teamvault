# TeamVault space configuration
#
# A space is one team's instance. This file is the contract for what packs
# are enabled, what compliance level applies, and how auto-deploy behaves.
#
# THIS FILE IS THE TEMPLATE. Teams should fork and customize.

name: teamvault
description: TeamVault master template — fork to create your team space.

# Light Palace taxonomy (Kingdom → Palace → Wing → Hall → Room + Tunnels).
# Only KINGDOMS are centrally declared here; palaces/wings/halls/rooms are
# free-form per-repo (repos.yaml) and per-entry — they emerge from use.
# See docs/KB-FOUNDATIONS.md for the canonical taxonomy reference.
#
# v0.1.x: kingdoms here are documentation-only. v0.1.5+ adds soft validation
# (/teamvault-publish WARNs if an entry's `kingdom` isn't in this list;
# never blocks). Rename `your-org` to match your team (e.g., title-21).
kingdoms:
  - your-org

compliance: true            # true → auto-deploy disabled; pack updates require /teamvault-apply-pack-update
enabled_packs:
  - hipaa-reference         # PHI scrubbing + compliance reference
  - clickup                 # ClickUp task linkage
  - jira-linkage            # Jira issue linkage
auto_deploy: true           # automatically apply pack updates within ~60s of git pull
